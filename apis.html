<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free API's</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; padding: 20px; }

        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            align-items: flex-start;
        }

        .card {
            width: 320px;
            background-color: #24233b;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            transition: 0.4s ease;
            box-shadow: 0px 10px 15px rgba(0,0,0,0.3);
            overflow: hidden; /* Zorgt dat preview binnen de border-radius blijft */
        }

        .card:hover { box-shadow: 0px 15px 20px rgba(0,0,0,0.5); }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(0,0,0,0.2);
        }

        .top { display: flex; align-items: center; }
        .circle2 { width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .red { background-color: #ff605c; }
        .yellow { background-color: #ffbd44; }
        .green { background-color: #00ca4e; }
        .title-text { color: white; font-size: 14px; font-weight: bold; margin-left: 5px; }

        .content { padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        .prompt-input {
            width: 100%;
            box-sizing: border-box;
            background-color: transparent;
            border: 1px solid #475569;
            border-radius: 5px;
            color: #94a3b8;
            padding: 8px;
            font-size: 12px;
            outline: none;
        }

        .code-input {
            width: 100%;
            height: 60px;
            box-sizing: border-box;
            resize: none;
            background-color: rgb(73, 70, 92);
            border-radius: 5px;
            border: none;
            color: white;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
        }

        .actions { display: flex; gap: 10px; padding: 0 15px 15px 15px; }

        .btn {
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.2s;
            flex: 1;
            height: 35px;
        }

        .copy { background-color: #334155; color: #cbd5e1; }
        .run { background-color: #3b82f6; color: white; }
        .copy.copied { background-color: #00ca4e; color: white; }

        /* IN-LINE PREVIEW STYLES */
        .preview-area {
            display: none; /* Standaard uit */
            border-top: 1px solid rgba(255,255,255,0.1);
            background: #ffffff;
            height: 250px;
            position: relative;
        }

        .preview-area iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .mc-preview iframe {
            width: 900px;
            height: 430px;
            transform: scale(0.372);
            transform-origin: top left;
            border: none;
            background: transparent;
        }

        .close-preview {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff605c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 10px;
            padding: 2px 6px;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="cards">
        
        <div class="card" data-base-url="https://text.pollinations.ai/">
            <div class="header">
                <div class="top">
                    <span class="red circle2"></span><span class="yellow circle2"></span><span class="green circle2"></span>
                    <span class="title-text">Pollinations.AI</span>
                </div>
            </div>
            <div class="content">
                <textarea class="code-input" readonly></textarea>
                <input type="text" class="prompt-input" oninput="syncUrl(this)" placeholder="Enter a Prompt..." value="hi">
            </div>
            <div class="actions">
                <button onclick="copyText(this)" class="btn copy">Copy</button>
                <button onclick="runApiInline(this)" class="btn run">Run</button>
            </div>
            <div class="preview-area">
                <button class="close-preview" onclick="closeInline(this)">X</button>
                <iframe src=""></iframe>
            </div>
        </div>

        <div class="card" data-base-url="https://picsum.photos/">
            <div class="header">
                <div class="top">
                    <span class="red circle2"></span><span class="yellow circle2"></span><span class="green circle2"></span>
                    <span class="title-text">Lorem Picsum</span>
                </div>
            </div>
            <div class="content">
                <textarea class="code-input" readonly></textarea>
                <input type="text" class="prompt-input" oninput="syncUrl(this)" placeholder="Try: 320/250" value="320/250">
            </div>
            <div class="actions">
                <button onclick="copyText(this)" class="btn copy">Copy</button>
                <button onclick="runApiInline(this)" class="btn run">Run</button>
            </div>
            <div class="preview-area">
                <button class="close-preview" onclick="closeInline(this)">X</button>
                <iframe src=""></iframe>
            </div>
        </div>

        <div class="card" data-base-url="https://api.mcstatus.io/widget/java/" data-suffix="">
            <div class="header">
                <div class="top">
                    <span class="red circle2"></span><span class="yellow circle2"></span><span class="green circle2"></span>
                    <span class="title-text">MC Server Status</span>
                </div>
            </div>
            <div class="content">
                <textarea class="code-input" readonly></textarea>
                <input type="text" class="prompt-input" oninput="syncUrl(this)" placeholder="Server IP..." value="hypixel.net">
            </div>
            <div class="actions">
                <button onclick="copyText(this)" class="btn copy">Copy</button>
                <button onclick="runApiInline(this)" class="btn run">Run</button>
            </div>
            <div class="preview-area mc-preview">
                <button class="close-preview" onclick="closeInline(this)">X</button>
                <iframe src=""></iframe>
            </div>
        </div>

        <div class="card" data-base-url="https://minotar.net/avatar/">
            <div class="header">
                <div class="top">
                    <span class="red circle2"></span><span class="yellow circle2"></span><span class="green circle2"></span>
                    <span class="title-text">Minotar</span>
                </div>
            </div>
            <div class="content">
                <textarea class="code-input" readonly></textarea>
                <input type="text" class="prompt-input" oninput="syncUrl(this)" placeholder="Enter a username..." value="Notch">
            </div>
            <div class="actions">
                <button onclick="copyText(this)" class="btn copy">Copy</button>
                <button onclick="runApiInline(this)" class="btn run">Run</button>
            </div>
            <div class="preview-area">
                <button class="close-preview" onclick="closeInline(this)">X</button>
                <iframe src=""></iframe>
            </div>
        </div>

        <div class="card" data-base-url="https://api.mojang.com/users/profiles/minecraft/">
            <div class="header">
                <div class="top">
                    <span class="red circle2"></span><span class="yellow circle2"></span><span class="green circle2"></span>
                    <span class="title-text">Mojang API</span>
                </div>
            </div>
            <div class="content">
                <textarea class="code-input" readonly></textarea>
                <input type="text" class="prompt-input" oninput="syncUrl(this)" placeholder="Enter a username..." value="Notch">
            </div>
            <div class="actions">
                <button onclick="copyText(this)" class="btn copy">Copy</button>
                <button onclick="runApiInline(this)" class="btn run">Run</button>
            </div>
            <div class="preview-area">
                <button class="close-preview" onclick="closeInline(this)">X</button>
                <iframe src=""></iframe>
            </div>
        </div>

    </div>

    <script>
    function syncUrl(inputElement) {
        const card = inputElement.closest('.card');
        const baseUrl = card.getAttribute('data-base-url');
        const textarea = card.querySelector('.code-input');
        textarea.value = baseUrl + inputElement.value;
    }

    document.querySelectorAll('.prompt-input').forEach(input => syncUrl(input));

    function copyText(button) {
        const card = button.closest('.card');
        const textarea = card.querySelector('.code-input');
        textarea.select();
        navigator.clipboard.writeText(textarea.value);

        button.innerText = "Copied!";
        button.classList.add('copied');
        setTimeout(() => {
            button.innerText = "Copy";
            button.classList.remove('copied');
        }, 2000);
    }

    // NIEUWE FUNCTIE: Run in de card zelf
    function runApiInline(button) {
        const card = button.closest('.card');
        const url = card.querySelector('.code-input').value;
        const previewArea = card.querySelector('.preview-area');
        const iframe = previewArea.querySelector('iframe');

        // Toon de area en laad de URL
        previewArea.style.display = 'block';
        iframe.src = url;
    }

    // NIEUWE FUNCTIE: Sluit de preview in de card
    function closeInline(button) {
        const previewArea = button.closest('.preview-area');
        const iframe = previewArea.querySelector('iframe');
        
        previewArea.style.display = 'none';
        iframe.src = ''; // Stop het laden
    }
    </script>
</body>
</html>
